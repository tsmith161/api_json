<head>
    <title>Display Products</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #result {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .product-card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            width: 250px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            background-color: #f9f9f9;
        }
        .product-card h3 {
            margin-top: 0;
            color: #333;
        }
        .product-card p {
            margin: 5px 0;
        }
        .categories {
            font-size: 0.9em;
            color: #555;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h1>Our Products</h1>
    <button id="loadProducts" onclick="loadList()">Load Products</button>
    <div id="result">
    </div>
    <script>
        function loadList() {
            $.get( "https://github.com/tsmith161/api_json/blob/main/products.json",
                    function( data )
                    {
                        console.log('raw data\n'+ data)
                        let str = "";
                        data["products"].forEach(function(product) {
                            str += "<div class='product-card'><h3>" + product.name + "</h3><p>" + 
                                   product.description + "</p>" + 
                                   "<p>Price: $" + product.price + 
                                   "</p><p>Categories: " + product.categories.join(", ") + "</p></div>";
                        })
                        document.getElementById("result").innerHTML = str;
                    }
            )
        }
    </script>
</body>
